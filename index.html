<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Karla:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #16291f;
    --green-shadow: #0f1d16;
    --porcelain: #f4f2ea;
    --porcelain-dim: rgba(244, 242, 234, 0.62);
    --gold: #c2a36b;
    --hairline: rgba(244, 242, 234, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: radial-gradient(120% 140% at 70% 10%, var(--green-deep) 0%, var(--green-shadow) 100%);
    color: var(--porcelain);
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  .card {
    display: grid;
    grid-template-columns: auto 1px auto;
    gap: clamp(2rem, 6vw, 4.5rem);
    align-items: center;
    max-width: 880px;
    width: 100%;
    justify-content: center;
  }

  .divider {
    width: 1px;
    height: clamp(180px, 32vh, 280px);
    background: linear-gradient(to bottom, transparent, var(--hairline) 20%, var(--hairline) 80%, transparent);
  }

  /* ---- Lily illustration ---- */
  .lily {
    width: clamp(110px, 16vw, 160px);
    height: auto;
    display: block;
    margin-inline: auto;
  }

  .lily path {
    fill: none;
    stroke: var(--gold);
    stroke-width: 1.4;
    stroke-linecap: round;
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: draw 2.6s ease-out forwards;
  }
  .lily path:nth-child(2) { animation-delay: 0.5s; }
  .lily path:nth-child(3) { animation-delay: 1.0s; }
  .lily path:nth-child(4) { animation-delay: 1.4s; stroke: var(--porcelain-dim); stroke-width: 1.1; }

  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* ---- Text block ---- */
  .text { max-width: 420px; }

  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.4rem;
    opacity: 0;
    animation: rise 0.9s ease-out 0.3s forwards;
  }

  h1 {
    font-family: 'Marcellus', serif;
    font-weight: 400;
    font-size: clamp(2.4rem, 5.5vw, 3.4rem);
    line-height: 1.08;
    letter-spacing: 0.015em;
    opacity: 0;
    animation: rise 0.9s ease-out 0.5s forwards;
  }

  .tagline {
    margin-top: 1.4rem;
    font-size: clamp(1rem, 1.6vw, 1.1rem);
    line-height: 1.65;
    color: var(--porcelain-dim);
    opacity: 0;
    animation: rise 0.9s ease-out 0.7s forwards;
  }

  .contact {
    margin-top: 2.4rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.6rem;
    align-items: center;
    opacity: 0;
    animation: rise 0.9s ease-out 0.9s forwards;
  }

  .contact a {
    color: var(--porcelain);
    text-decoration: none;
    font-size: 0.92rem;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 3px;
    transition: color 0.25s ease, border-color 0.25s ease;
  }

  .contact a:hover { color: var(--gold); }

  .contact a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 4px;
    border-radius: 2px;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  footer {
    text-align: center;
    padding: 1.6rem;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(244, 242, 234, 0.35);
  }

  /* ---- Mobile ---- */
  @media (max-width: 640px) {
    .card {
      grid-template-columns: 1fr;
      text-align: center;
      gap: 2rem;
    }
    .divider {
      width: clamp(120px, 40vw, 200px);
      height: 1px;
      margin-inline: auto;
      background: linear-gradient(to right, transparent, var(--hairline) 20%, var(--hairline) 80%, transparent);
    }
    .text { margin-inline: auto; }
    .contact { justify-content: center; }
  }

  @media (prefers-reduced-motion: reduce) {
    .lily path { animation: none; stroke-dashoffset: 0; }
    .eyebrow, h1, .tagline, .contact { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

<main>
  <div class="card">

    <!-- Calla lily line drawing -->
    <svg class="lily" viewBox="0 0 160 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Line drawing of a calla lily">
      <!-- stem -->
      <path d="M78 232 C 80 190, 74 150, 80 112 C 84 86, 92 70, 98 58"/>
      <!-- spathe: outer sweep -->
      <path d="M98 58 C 78 44, 64 28, 70 14 C 92 6, 118 14, 126 36 C 132 54, 120 70, 100 72 C 96 70, 96 64, 98 58 Z"/>
      <!-- spadix -->
      <path d="M96 60 C 98 50, 102 40, 108 32"/>
      <!-- leaf -->
      <path d="M78 196 C 56 188, 38 170, 36 146 C 58 148, 76 164, 80 188"/>
    </svg>

    <div class="divider" aria-hidden="true"></div>

    <div class="text">
      <p class="eyebrow">Taking Brands to the World</p>
      <h1>LysCalla<br>Advisory</h1>
      <p class="tagline">
        Independent counsel on brand strategy, international development, and identity
        — for businesses that intend to be remembered.
      </p>
      <div class="contact">
        <a href="mailto:hello@lyscallaadvisory.com">hello@lyscallaadvisory.com</a>
        <a href="https://www.linkedin.com/in/sharmilamurat/" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>

  </div>
</main>

<footer>© 2026 LysCalla Advisory (Hong Kong) Limited </footer>

</body>
</html>
